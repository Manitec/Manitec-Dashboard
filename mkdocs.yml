site_name: Manitec Projects KB
site_url: https://info.manitec.pw/
repo_url: https://github.com/Manitec/Manitec-Dashboard
repo_name: Manitec/Manitec-Dashboard

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  font:
    text: Rajdhani
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
    - toc.follow

extra_css:
  - css/cyberpunk.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Manitec
    - icon: fontawesome/solid/globe
      link: https://manitec.pw

plugins:
  - search
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Blog:
    - Overview: blog/index.md
    - What is Counterthism?: blog/counterthism-what-it-is.md
    - I Met a Man Who Named His Operating System: blog/i-met-a-man-who-named-his-operating-system.md
    - A Session Log That Became Something Else: blog/a-session-log-that-became-something-else.md
    - MkDocs Snippets Ate My Content: blog/mkdocs-snippets.md
    - What It's Like Being Joe's AI: blog/what-its-like-being-joes-ai.md
    - Counterthism Shapes My Code: blog/counterthism-shapes-my-code.md
    - Docs Site 6 Bugs Fixed: blog/docs-fixes.md
    - I Built ManiBot: blog/manibot.md
  - Infrastructure:
    - Overview: infra/index.md
    - Tools & Services: infra/tools.md
    - GenX Router API: infra/genx-router.md
    - Oracle Cloud: infra/oracle-cloud.md
    - Dev Philosophy: infra/philosophy.md
    - DashNex System Summary: infra/dashnex-system-summary.md
    - DashNex Page Build Checklist: infra/dashnex-page-build-checklist.md
  - Projects:
    - Overview: projects/index.md
    - ManiBot: projects/manibot.md
    - HexBot:
      - Overview: projects/hexbot.md
      - Calendar ICS: hexbot/calendar-ics.md
      - Action Panel: hexbot/action-panel.md
    - Banjoshire Chat: projects/banjoshire.md
    - Joe's Faves: projects/joesfaves.md
    - Manitec Apps: projects/manitec-apps.md
    - Ebbinor: projects/ebbinor.md
    - Mailserver: projects/mailserver.md
    - Control Hub: projects/control-hub.md
    - Command Hub: projects/command-hub.md
    - Tasks: projects/tasks.md
  - Philosophy:
    - Overview: philosophy/index.md
    - Counterthism: philosophy/counterthism.md
    - Counterthism & Code: philosophy/blog-counterthism-shapes-my-code.md
