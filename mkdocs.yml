site_name: Manitec Projects KB
site_url: https://manitec.github.io/Manitec-Dashboard/
repo_url: https://github.com/Manitec/Manitec-Dashboard
repo_name: Manitec/Manitec-Dashboard

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  font:
    text: Rajdhani
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - css/cyberpunk.css

plugins:
  - search
  - git-revision-date-localized:
      type: date

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Infrastructure:
    - Overview: infra/index.md
    - Tools & Services: infra/tools.md
    - GenX Router API: infra/genx-router.md
    - Oracle Cloud: infra/oracle-cloud.md
    - Dev Philosophy: infra/philosophy.md
    - DashNex System Summary: infra/dashnex-system-summary.md
    - DashNex Page Build Checklist: infra/dashnex-page-build-checklist.md
  - Projects:
    - Overview: projects/index.md
    - ManiBot: projects/manibot.md
    - HexBot: projects/hexbot.md
    - Banjoshire Chat: projects/banjoshire.md
    - Joe's Faves: projects/joesfaves.md
    - Manitec Apps: projects/manitec-apps.md
    - Ebbinor: projects/ebbinor.md
    - Mailserver: projects/mailserver.md
    - Tasks: projects/tasks.md
  - Philosophy:
    - Overview: philosophy/index.md
    - Counterthism: philosophy/counterthism.md
